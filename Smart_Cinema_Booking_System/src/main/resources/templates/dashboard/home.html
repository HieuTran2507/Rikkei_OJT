<!DOCTYPE html>
<html lang="en"
      xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>ABC Cinema</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" th:href="@{/css/common.css}">
    <link rel="stylesheet" th:href="@{/css/profile-style.css}">
    <link rel="stylesheet" th:href="@{/css/movie-style.css}">
</head>

<body class="min-h-screen flex flex-col">

<!--HEADER-->
<div id="header-container">
    <div th:replace="~{fragments/header :: header}"></div>
</div>

<!--BODY-->
<div class="flex flex-1">
<!--SIDEBAR-->
    <div th:replace="~{fragments/sidebar :: sidebar}"></div>
<!--MAIN CONTENT-->
    <main id="main-content" class="flex-1 p-6">

        <h2 class="text-3xl font-bold mb-6">
            Dashboard
        </h2>

        <div class="bg-white rounded-xl shadow p-6">
            <h3 class="text-xl font-semibold">
                Chào mừng đến với ABC Cinema
            </h3>

            <p class="mt-3 text-gray-600">
                Hãy chọn chức năng từ menu
            </p>
        </div>

    </main>

</div>

<!--FOOTER-->
<div th:replace="~{fragments/footer :: footer}"></div>
<script>
    localStorage.setItem("activeMenu", "dashboard");
</script>
<!--<script th:src="@{/js/dashboard.js}"></script>-->
<script th:src="@{/js/common.js}"></script>
<script th:src="@{/js/profile.js}"></script>
<script th:src="@{/js/movie.js}"></script>
<script th:src="@{/js/showtime.js}"></script>
<script th:src="@{/js/booking.js}"></script>


</body>
</html>
