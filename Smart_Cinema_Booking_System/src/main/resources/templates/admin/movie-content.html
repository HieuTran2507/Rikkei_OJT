<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<div class="bg-white rounded-xl shadow p-6">
    <!-- SEARCH + ADD -->
    <div class="flex justify-between mb-4">
        <div class="flex gap-2">
            <input type="text"
                   id="search"
                   th:value="${keyword}"
                   placeholder="Search..."
                   class="border px-3 py-2 rounded w-80">

            <button onclick="searchMovies()"
                    class="bg-blue-500 hover:bg-blue-600 text-white px-4 py-2 rounded">
                Search
            </button>
        </div>


        <button onclick="openCreateMovieModal()"
                class="bg-yellow-400 hover:bg-yellow-500 px-4 py-2 rounded font-semibold">
            + Thêm phim
        </button>

    </div>

    <!-- TABLE -->
    <div th:if="${movies != null and movies.totalElements > 0}">

        <table class="movie-table">

            <thead>
            <tr>
                <th>Poster</th>
                <th>Tên phim</th>
                <th>Thời lượng</th>
                <th>Trạng thái</th>
                <th>Thao tác</th>
            </tr>
            </thead>

            <tbody>

            <tr th:each="m : ${movies.content}" class="movie-row">

                <td>
                    <img th:src="${m.posterUrl != null ?
                            m.posterUrl : '/posters/default.png'}"
                         class="movie-poster"
                    >
                </td>

                <td th:text="${m.title}"></td>

                <td th:text="${m.duration} + ' phút'"></td>

                <td>
                    <span class="movie-status"
                          th:text="${m.status}"
                          th:classappend="${
                              m.status.name() == 'NOW_SHOWING' ? 'movie-status-now' :
                              m.status.name() == 'COMING_SOON' ? 'movie-status-soon' :
                              'movie-status-stop'
                          }">
                    </span>
                </td>

                <td class="space-x-2">

                    <button class="movie-btn-edit"
                            th:attr="data-id=${m.movieId}"
                            onclick="openEditMovieModal(this)">
                        Sửa
                    </button>

                    <button class="movie-btn-delete"
                            th:attr="data-id=${m.movieId}"
                            onclick="deleteMovie(this)">
                        Xóa
                    </button>

                </td>

            </tr>

            </tbody>

        </table>

        <!-- PAGINATION -->
        <div class="flex justify-center gap-2 mt-4">

            <!-- Prev -->
            <button class="pagination-btn"
                    th:if="${movies.hasPrevious()}"
                    th:onclick="'goToPage(' + ${movies.number - 1} + ')'">
                Prev
            </button>

            <!-- Page numbers -->
            <button class="pagination-btn"
                    th:each="i : ${#numbers.sequence(0, movies.totalPages - 1)}"
                    th:text="${i + 1}"
                    th:classappend="${i == movies.number} ? 'active-page' : ''"
                    th:onclick="'goToPage(' + ${i} + ')'">
            </button>

            <!-- Next -->
            <button class="pagination-btn"
                    th:if="${movies.hasNext()}"
                    th:onclick="'goToPage(' + ${movies.number + 1} + ')'">
                Next
            </button>

        </div>

    </div>

    <!-- EMPTY -->
    <div th:if="${movies == null or movies.totalElements == 0}"
         class="movie-empty-box">

        <div class="text-xl font-semibold">
            Không có phim trong danh sách
        </div>
    </div>

    <div th:replace="~{admin/add-movies-modal :: createMovieModal}"></div>
</div>

</html>
