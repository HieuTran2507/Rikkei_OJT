<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<body>
<div th:fragment="profileModal">
    <div id="profileModal" class="modal-overlay hidden">
        <div class="modal-box">
            <div class="modal-header">
                <h3>Chỉnh sửa thông tin</h3>
                <button onclick="closeProfileModal()">✕</button>
            </div>

            <form id="profileForm">
                <div class="form-group">
                    <label>Email</label>
                    <input id="editEmail" type="text" th:value="${user.email}">
                    <p id="emailError" class="error-text"></p>
                </div>

                <div class="form-group">
                    <label>Họ tên</label>
                    <input id="editFullName" type="text" th:value="${user.fullName}">
                    <p id="fullNameError" class="error-text"></p>
                </div>

                <div class="form-group">
                    <label>Số điện thoại</label>
                    <input id="editPhone" type="text" th:value="${user.phone}">
                    <p id="phoneError" class="error-text"></p>
                </div>

                <div class="form-group">
                    <label>Địa chỉ</label>
                    <textarea id="editAddress" rows="3" th:text="${user.address}"></textarea>
                    <p id="addressError" class="error-text"></p>
                </div>

                <div class="flex gap-3 mt-6">
                    <button type="button" onclick="updateProfile()" class="profile-btn-primary">
                        Lưu
                    </button>

                    <button type="button" onclick="closeProfileModal()" class="profile-btn-secondary">
                        Hủy
                    </button>
                </div>

            </form>

        </div>

    </div>

</div>
</body>
</html>
