<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<div th:fragment="credentialModal">
  <div id="credentialModal" class="profile-modal-overlay hidden">
    <div class="profile-modal-box">
      <div class="profile-modal-header">
        <h3>Sửa thông tin đăng nhập</h3>
        <button onclick="closeCredentialModal()">✕</button>
      </div>

      <form id="credentialForm" class="profile-form">
        <div class="profile-form-group">
          <label>Username hiện tại</label>
          <input id="currentUsername" type="text">
          <p id="currentUsernameError" class="error-text"></p>
        </div>

        <div class="profile-form-group">
          <label>Password hiện tại</label>
          <input id="currentPassword" type="password">
          <p id="currentPasswordError" class="error-text"></p>
        </div>

        <hr class="my-4">

        <div class="profile-form-group">
          <label>Username mới</label>
          <input id="newUsername" type="text">
          <p id="newUsernameError" class="error-text"></p>
        </div>

        <div class="profile-form-group">
          <label>Password mới</label>
          <input id="newPassword" type="password">
          <p id="newPasswordError" class="error-text"></p>
        </div>

        <div class="flex gap-3 mt-6">
          <button type="button" onclick="updateCredential()" class="profile-btn-primary">
            Lưu
          </button>

          <button type="button" onclick="closeCredentialModal()" class="profile-btn-secondary">
            Hủy
          </button>

        </div>

      </form>

    </div>

  </div>

</div>
</html>
